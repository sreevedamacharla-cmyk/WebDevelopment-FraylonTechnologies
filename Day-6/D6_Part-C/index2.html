<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Responsive Pricing Table Using flexbox</title>
    <link rel="stylesheet" href="style2.css" />
  </head>
  <body>
    <h1 align="center">Pricing Plans</h1>

    <div class="container">
      <div class="card">
        <h2>Basic</h2>

        <h3>₹199</h3>

        <p>5 Projects</p>

        <p>Email Support</p>

        <button>Buy</button>
      </div>

      <div class="card">
        <h2>Standard</h2>

        <h3>₹499</h3>

        <p>20 Projects</p>

        <p>Priority Support</p>

        <button>Buy</button>
      </div>

      <div class="card">
        <h2>Premium</h2>

        <h3>₹999</h3>

        <p>Unlimited Projects</p>

        <p>24/7 Support</p>

        <button>Buy</button>
      </div>
    </div>
  </body>
</html>
